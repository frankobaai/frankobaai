<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" width="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06080f"/>
      <stop offset="100%" stop-color="#0e1223"/>
    </linearGradient>
    <linearGradient id="nameg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#c7d0ff"/>
      <stop offset="100%" stop-color="#6474ff"/>
    </linearGradient>
    <linearGradient id="accentg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6474ff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="circleg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6474ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="0"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#6474ff" stroke-width="1">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Right side decorative circles -->
  <circle cx="780" cy="60" r="55" fill="none" stroke="#6474ff" stroke-width="1" opacity="0.2"/>
  <circle cx="780" cy="60" r="38" fill="none" stroke="#6474ff" stroke-width="1" opacity="0.15"/>
  <circle cx="780" cy="60" r="22" fill="url(#circleg)" opacity="0.5"/>
  <circle cx="780" cy="60" r="6" fill="#6474ff" opacity="0.8" filter="url(#glow)"/>

  <circle cx="840" cy="140" r="28" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.15"/>
  <circle cx="840" cy="140" r="8" fill="#22d3ee" opacity="0.3"/>

  <circle cx="720" cy="150" r="4" fill="#6474ff" opacity="0.6"/>
  <circle cx="860" cy="50" r="3" fill="#22d3ee" opacity="0.5"/>
  <circle cx="700" cy="80" r="2.5" fill="#a5b4fc" opacity="0.5"/>

  <!-- Connecting lines -->
  <line x1="780" y1="60" x2="840" y2="140" stroke="#6474ff" stroke-width="1" opacity="0.15" stroke-dasharray="4 4"/>
  <line x1="780" y1="60" x2="720" y2="150" stroke="#22d3ee" stroke-width="1" opacity="0.1" stroke-dasharray="4 4"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="900" height="3" fill="url(#accentg)"/>

  <!-- Main text -->
  <text x="55" y="90" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" font-size="56" font-weight="800" letter-spacing="-2" fill="url(#nameg)">Kobaai Frank</text>

  <!-- Divider -->
  <rect x="55" y="108" width="100" height="3" fill="url(#accentg)" rx="2"/>

  <!-- Subtitle -->
  <text x="55" y="142" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" font-size="15" fill="#8b98b8" letter-spacing="0.3">Full-Stack Developer  ·  .NET / C#  ·  React / TypeScript  ·  AI Systems</text>

  <!-- Tag line -->
  <rect x="55" y="162" width="10" height="10" rx="2" fill="#34d399"/>
  <text x="70" y="172" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" font-size="12" fill="#34d399" font-weight="600" letter-spacing="0.5">OPEN TO REMOTE OPPORTUNITIES</text>
</svg>
